<!doctype html>
<html lang="lt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <title>Tetris Mobile</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app" aria-label="Tetris žaidimas">
      <header class="topbar">
        <div>
          <span class="label">Tetris Mobile</span>
          <strong>Žaisk nykščiais</strong>
        </div>
        <div class="actions">
          <button id="pauseButton" type="button">Pauzė</button>
          <button id="restartButton" type="button">Iš naujo</button>
        </div>
      </header>

      <section class="play-area">
        <header class="hud">
          <div>
            <span class="label">Taškai</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="label">Lygis</span>
            <strong id="level">1</strong>
          </div>
          <div>
            <span class="label">Linijos</span>
            <strong id="lines">0</strong>
          </div>
          <div>
            <span class="label">Kita</span>
            <canvas id="next" width="120" height="120" aria-label="Kita figūra"></canvas>
          </div>
        </header>

        <div class="board-wrap">
          <canvas id="board" width="300" height="600" aria-label="Tetris lenta"></canvas>
          <div class="overlay" id="overlay">
            <h1>Tetris</h1>
            <p id="overlayText">Spausk pradėti ir dėliok figūras.</p>
            <button id="startButton" type="button">Pradėti</button>
          </div>
        </div>
      </section>

      <nav class="controls" aria-label="Lietimo valdymas">
        <button data-action="left" type="button" aria-label="Kairė">←</button>
        <button data-action="down" type="button" aria-label="Žemyn">↓</button>
        <button data-action="right" type="button" aria-label="Dešinė">→</button>
        <button data-action="rotate" type="button" aria-label="Pasukti">↻</button>
        <button data-action="drop" type="button" aria-label="Nuleisti iki apačios">Nuleisti</button>
      </nav>
    </main>

    <script src="game.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./service-worker.js");
      }
    </script>
  </body>
</html>
