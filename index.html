<!doctype html>
<html lang="lt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b1220">
    <title>Tetris Runner</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app" aria-label="Tetris Runner žaidimas">
      <header class="topbar">
        <div>
          <span class="label">Tetris Runner</span>
          <strong>Šokinėk tarp figūrų</strong>
        </div>
        <div class="actions">
          <button id="pauseButton" type="button">Pauzė</button>
          <button id="restartButton" type="button">Iš naujo</button>
        </div>
      </header>

      <section class="play-area">
        <header class="hud">
          <div>
            <span class="label">Taškai</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="label">Greitis</span>
            <strong id="level">1</strong>
          </div>
          <div>
            <span class="label">Linijos</span>
            <strong id="lines">0</strong>
          </div>
          <div>
            <span class="label">Kita</span>
            <canvas id="next" width="120" height="120" aria-label="Kita figūra"></canvas>
          </div>
        </header>

        <div class="board-wrap">
          <canvas id="board" width="300" height="600" aria-label="Tetris platformerio lenta"></canvas>
          <div class="overlay" id="overlay">
            <h1>Tetris Runner</h1>
            <p id="overlayText">Bėk, šok ant figūrų ir venk krentančių blokų.</p>
            <button id="startButton" type="button">Pradėti</button>
          </div>
        </div>
      </section>

      <nav class="controls" aria-label="Lietimo valdymas">
        <button data-action="left" type="button" aria-label="Bėgti į kairę">←</button>
        <button data-action="jump" type="button" aria-label="Šokti">Šokti</button>
        <button data-action="right" type="button" aria-label="Bėgti į dešinę">→</button>
      </nav>
    </main>

    <script src="game.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./service-worker.js");
      }
    </script>
  </body>
</html>
